# ci.yml
# Copy to: .github/workflows/ci.yml in your repository.
#
# Runs on every push and pull request.
# Installs all three tools, runs the audit, saves results.json,
# and fails the build if any secrets are found.

name: Secret Audit

on: [push, pull_request]

jobs:
  audit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo (full history needed for git scans)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install detect-secrets
        run: pip install detect-secrets

      - name: Install trufflehog
        run: |
          curl -sSfL https://raw.githubusercontent.com/trufflesecurity/trufflehog/main/scripts/install.sh | sh -s -- -b /usr/local/bin

      - name: Install gitleaks
        run: |
          VERSION=$(curl -s https://api.github.com/repos/gitleaks/gitleaks/releases/latest \
            | python3 -c "import sys,json; print(json.load(sys.stdin)['tag_name'][1:])")
          curl -sSL "https://github.com/gitleaks/gitleaks/releases/download/v${VERSION}/gitleaks_${VERSION}_linux_x64.tar.gz" \
            | tar -xz gitleaks
          sudo mv gitleaks /usr/local/bin/

      - name: Run secret audit
        run: python audit.py --path .

      - name: Upload results.json
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: secret-audit-results
          path: results.json

      - name: Fail build if secrets found
        run: |
          python3 -c "
          import json, sys
          data = json.load(open('results.json'))
          total = sum(len(v['findings']) for v in data.values())
          if total > 0:
              print(f'FAILED: {total} secret(s) found. Check results.json.')
              sys.exit(1)
          print('PASSED: No secrets found.')
          "
